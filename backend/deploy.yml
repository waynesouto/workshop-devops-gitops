apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 221719046810.dkr.ecr.us-east-1.amazonaws.com/workshop-devops/production/backend
          ports:
            - containerPort: 80
